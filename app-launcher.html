<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Launcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 16px;
    }
    h1 { text-align: center; font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: #f0f6fc; }
    .subtitle { text-align: center; color: #8b949e; font-size: 0.875rem; margin-bottom: 24px; }

    .tabs {
      display: flex; max-width: 480px; margin: 0 auto 28px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 4px; gap: 4px;
    }
    .tab {
      flex: 1; background: none; border: none; border-radius: 9px;
      color: #8b949e; padding: 10px 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; text-align: center; line-height: 1.4; transition: all 0.15s;
    }
    .tab small { display: block; font-weight: 400; font-size: 11px; opacity: 0.75; }
    .tab.active { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }

    .token-bar {
      max-width: 900px; margin: 0 auto 20px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; overflow: hidden; display: none;
    }
    .token-bar.show { display: block; }
    .token-toggle {
      width: 100%; background: none; border: none; color: #e6edf3;
      padding: 13px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .token-body { padding: 0 16px 14px; display: none; }
    .token-body.open { display: block; }
    .token-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .token-row { display: flex; gap: 8px; }
    .token-row input {
      flex: 1; background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3; padding: 10px 12px;
      font-size: 14px; font-family: monospace; min-width: 0;
    }
    .token-row input:focus { outline: none; border-color: #58a6ff; }
    .btn-save {
      background: #58a6ff; color: #0d1117; border: none;
      border-radius: 8px; padding: 10px 18px; font-size: 14px;
      font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .token-saved { font-size: 12px; color: #3fb950; margin-top: 6px; display: none; }
    .token-saved.show { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; max-width: 900px; margin: 0 auto;
    }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit; transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: #58a6ff; background: #1c2128; }

    .card-p2 {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; overflow: hidden; transition: border-color 0.15s;
    }
    .card-p2:hover { border-color: #bc8cff; }
    .card-p2-top { padding: 20px; display: flex; align-items: center; gap: 16px; }
    .build-btn {
      display: block; width: calc(100% - 32px); margin: 0 16px 16px;
      background: linear-gradient(135deg, #6e40c9, #9f5de2);
      color: white; border: none; border-radius: 9px;
      padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    .build-btn:active { opacity: 0.75; }
    .build-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .status-area {
      margin: 0 16px 14px; padding: 11px 13px;
      border-radius: 9px; font-size: 13px; line-height: 1.6; display: none;
    }
    .status-area.show { display: block; }
    .status-area.info    { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.25); color: #58a6ff; }
    .status-area.success { background: rgba(63,185,80,0.08);  border: 1px solid rgba(63,185,80,0.25);  color: #3fb950; }
    .status-area.error   { background: rgba(248,81,73,0.08);  border: 1px solid rgba(248,81,73,0.25);  color: #f85149; }
    .status-area.building{ background: rgba(188,140,255,0.08);border: 1px solid rgba(188,140,255,0.25);color: #bc8cff; }
    .status-link { color: #58a6ff; text-decoration: none; font-weight: 600; }

    .progress-bar { height: 4px; background: #30363d; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: #bc8cff; border-radius: 2px;
      width: 5%; transition: width 1s ease; animation: ppulse 2s ease-in-out infinite;
    }
    @keyframes ppulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.75s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .emoji { font-size: 2rem; flex-shrink: 0; width: 48px; text-align: center; }
    .info { flex: 1; min-width: 0; }
    .name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; color: #f0f6fc; }
    .path { font-size: 0.75rem; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .arrow { color: #58a6ff; font-size: 1.25rem; flex-shrink: 0; }
  </style>
</head>
<body>

  <h1>📱 App Launcher</h1>
  <p class="subtitle" id="subtitle">Open any app in GitHub Codespaces — scan the QR code in Expo Go</p>

  <div class="tabs">
    <button class="tab active" id="tab1" onclick="setPipeline(1)">
      🚀 Pipeline 1
      <small>Expo Go · Codespaces</small>
    </button>
    <button class="tab" id="tab2" onclick="setPipeline(2)">
      📦 Pipeline 2
      <small>EAS Build · Install</small>
    </button>
  </div>

  <div class="token-bar" id="token-bar">
    <button class="token-toggle" onclick="toggleToken()">
      <span>🔑 GitHub Token</span>
      <span id="token-arrow">▼</span>
    </button>
    <div class="token-body" id="token-body">
      <div class="token-label">GitHub Personal Access Token with <code>repo</code> scope — required to trigger EAS builds via GitHub Actions</div>
      <div class="token-row">
        <input type="password" id="expo-token-input" placeholder="ghp_..." />
        <button class="btn-save" onclick="saveGithubToken()">Save</button>
      </div>
      <div class="token-saved" id="token-saved">✓ Token saved for this session</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const REPO = 'kani4jk-bot/coding-tasks';
    const GH_API = 'https://api.github.com';
    const GH_HEADERS = () => ({
      'Authorization': `Bearer ${githubToken}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    });

    // AUTO-GENERATED-APPS-START
    const APPS = [
      { name: 'Home Visualizer', emoji: '🏠', path: 'tasks/2026-03-27-architecture-project/mobile', slug: 'home-visualizer', easProjectId: '5f9a4d75-483e-4c9c-ad4a-82357a7a323a' },
      { name: 'Birdsong ID', emoji: '🐦', path: 'tasks/2026-04-01-bird-song-id-mvp/mobile', slug: 'birdsong-id', easProjectId: '60b2403f-d9ca-4ddc-a28a-ca26bdb0b56b' },
      { name: 'Plant ID', emoji: '🌿', path: 'tasks/2026-04-09-plant-identification-app/mobile', slug: 'plant-id', easProjectId: '9a25eba8-106d-4c61-b8ac-cfaeb4e7f164' },
      { name: 'VehicleID', emoji: '🚗', path: 'tasks/2026-04-09-vehicle-identification-app/mobile', slug: 'vehicle-id', easProjectId: 'e8f6ee23-9808-44df-b739-2b20fd30e5bb' },
      { name: 'Travel Planner', emoji: '✈️', path: 'tasks/2026-04-13-travel-planner-app/mobile', slug: 'travel-planner', easProjectId: 'f5c10a41-366d-489b-890e-c32cc9bf2803' },
      { name: 'Charades!', emoji: '🎭', path: 'tasks/2026-04-18-charades-mobile-game', slug: 'charades-mobile-game', easProjectId: '64a919d8-9535-4c0c-b10e-1656bba05377' },
      { name: 'Poker Calculator', emoji: '🃏', path: 'tasks/2026-04-30-poker-calculator', slug: 'poker-calculator', easProjectId: '64a919d8-9535-4c0c-b10e-1656bba05377' },
    ];
    // AUTO-GENERATED-APPS-END

    let pipeline = 1;
    let githubToken = '';

    function toggleToken() {
      const body = document.getElementById('token-body');
      const arrow = document.getElementById('token-arrow');
      body.classList.toggle('open');
      arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
    }

    function saveGithubToken() {
      const val = document.getElementById('expo-token-input').value.trim();
      if (!val) return;
      githubToken = val;
      document.getElementById('expo-token-input').value = '';
      document.getElementById('expo-token-input').placeholder = '••••••••••••••';
      document.getElementById('token-saved').classList.add('show');
    }

    function setPipeline(p) {
      pipeline = p;
      document.getElementById('tab1').classList.toggle('active', p === 1);
      document.getElementById('tab2').classList.toggle('active', p === 2);
      document.getElementById('token-bar').classList.toggle('show', p === 2);
      document.getElementById('subtitle').textContent = p === 1
        ? 'Open any app in GitHub Codespaces — scan the QR code in Expo Go'
        : 'Trigger an EAS cloud build via GitHub Actions — get an installable app link (~10 min)';
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      APPS.forEach(app => pipeline === 1 ? renderP1Card(grid, app) : renderP2Card(grid, app));
    }

    function renderP1Card(grid, app) {
      const devcontainerPath = encodeURIComponent(`${app.path}/.devcontainer/devcontainer.json`);
      const url = `https://codespaces.new/${REPO}?devcontainer_path=${devcontainerPath}`;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="emoji">${app.emoji}</div>
        <div class="info">
          <div class="name">${app.name}</div>
          <div class="path">${app.path}</div>
        </div>
        <div class="arrow">→</div>
      `;
      grid.appendChild(a);
    }

    function renderP2Card(grid, app) {
      const div = document.createElement('div');
      div.className = 'card-p2';
      div.id = `card-${app.slug}`;
      div.innerHTML = `
        <div class="card-p2-top">
          <div class="emoji">${app.emoji}</div>
          <div class="info">
            <div class="name">${app.name}</div>
            <div class="path">${app.path}</div>
          </div>
        </div>
        <button class="build-btn" id="btn-${app.slug}" onclick="triggerBuild('${app.slug}')">
          📦 Start EAS Build
        </button>
        <div class="status-area" id="status-${app.slug}"></div>
      `;
      grid.appendChild(div);
    }

    async function triggerBuild(slug) {
      if (!githubToken) {
        showStatus(slug, 'error', '⚠️ Save your GitHub token first (tap 🔑 GitHub Token above)');
        return;
      }
      const app = APPS.find(a => a.slug === slug);
      const btn = document.getElementById(`btn-${slug}`);
      btn.disabled = true;
      showStatus(slug, 'info', '<span class="spinner"></span> Triggering GitHub Actions workflow…');

      const triggerTime = new Date().toISOString();
      try {
        const res = await fetch(`${GH_API}/repos/${REPO}/actions/workflows/eas-build.yml/dispatches`, {
          method: 'POST',
          headers: { ...GH_HEADERS(), 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ref: 'main',
            inputs: { app: app.path, profile: 'preview', platform: 'all' },
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `GitHub API error ${res.status}`);
        }
        showStatus(slug, 'building',
          `<span class="spinner"></span> Workflow triggered — finding run…<br>
           <small style="color:#8b949e">Checking every 15 s</small>`
        );
        pollForRun(slug, app, triggerTime, 0);
      } catch (err) {
        showStatus(slug, 'error', `❌ ${err.message}`);
        btn.disabled = false;
      }
    }

    async function pollForRun(slug, app, since, attempt) {
      if (attempt > 20) {
        showStatus(slug, 'error',
          `❌ Could not find workflow run.<br>
           <a class="status-link" href="https://github.com/${REPO}/actions/workflows/eas-build.yml" target="_blank">Check GitHub Actions →</a>`
        );
        document.getElementById(`btn-${slug}`).disabled = false;
        return;
      }
      try {
        const res = await fetch(
          `${GH_API}/repos/${REPO}/actions/workflows/eas-build.yml/runs?event=workflow_dispatch&per_page=5`,
          { headers: GH_HEADERS() }
        );
        const data = await res.json();
        const sinceMs = new Date(since).getTime();
        const run = data.workflow_runs?.find(r => new Date(r.created_at).getTime() >= sinceMs);
        if (run) {
          showStatus(slug, 'building',
            `<span class="spinner"></span> Building… (Run #${run.run_number})<br>
             <div class="progress-bar"><div class="progress-fill" id="prog-${slug}"></div></div>
             <small style="color:#8b949e;display:block;margin-top:6px">~10 min — EAS Build running in CI</small>
             <a class="status-link" href="${run.html_url}" target="_blank">Watch on GitHub Actions →</a>`
          );
          pollRunStatus(slug, app, run.id, run.html_url, 0);
        } else {
          setTimeout(() => pollForRun(slug, app, since, attempt + 1), 15000);
        }
      } catch {
        setTimeout(() => pollForRun(slug, app, since, attempt + 1), 15000);
      }
    }

    async function pollRunStatus(slug, app, runId, runUrl, attempt) {
      if (attempt > 80) return;
      try {
        const res = await fetch(`${GH_API}/repos/${REPO}/actions/runs/${runId}`, { headers: GH_HEADERS() });
        const run = await res.json();
        const prog = document.getElementById(`prog-${slug}`);
        if (prog) prog.style.width = Math.min(5 + attempt * 1.5, 90) + '%';
        if (run.status === 'completed') {
          document.getElementById(`btn-${slug}`).disabled = false;
          if (run.conclusion === 'success') {
            const expoUrl = `https://expo.dev/projects/${app.easProjectId}/builds`;
            showStatus(slug, 'success',
              `✅ Build complete!<br>
               <a class="status-link" href="${expoUrl}" target="_blank">📥 Get install link on expo.dev →</a><br>
               <a class="status-link" href="${runUrl}" target="_blank" style="font-size:12px;opacity:0.7">View run →</a>`
            );
          } else {
            showStatus(slug, 'error',
              `❌ Build ${run.conclusion}.<br>
               <a class="status-link" href="${runUrl}" target="_blank">See details on GitHub →</a>`
            );
          }
        } else {
          setTimeout(() => pollRunStatus(slug, app, runId, runUrl, attempt + 1), 30000);
        }
      } catch {
        setTimeout(() => pollRunStatus(slug, app, runId, runUrl, attempt + 1), 30000);
      }
    }

    function showStatus(slug, type, html) {
      const el = document.getElementById(`status-${slug}`);
      if (!el) return;
      el.className = `status-area show ${type}`;
      el.innerHTML = html;
    }

    renderGrid();
  </script>
</body>
</html>
