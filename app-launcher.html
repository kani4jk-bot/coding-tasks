<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Launcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 16px;
    }
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f6fc;
    }
    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 0.875rem;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }
    .emoji {
      font-size: 2rem;
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }
    .info { flex: 1; min-width: 0; }
    .name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
      color: #f0f6fc;
    }
    .path {
      font-size: 0.75rem;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .arrow {
      color: #58a6ff;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>📱 App Launcher</h1>
  <p class="subtitle">Open any app in GitHub Codespaces — scan the QR code in Expo Go</p>
  <div class="grid" id="grid"></div>

  <script>
    const REPO = 'kani4jk-bot/coding-tasks';

    // AUTO-GENERATED-APPS-START
    const APPS = [
      { name: 'Home Visualizer', emoji: '🏠', path: 'tasks/2026-03-27-architecture-project/mobile', slug: 'home-visualizer' },
      { name: 'Birdsong ID', emoji: '🐦', path: 'tasks/2026-04-01-bird-song-id-mvp/mobile', slug: 'birdsong-id' },
      { name: 'Plant ID', emoji: '🌿', path: 'tasks/2026-04-09-plant-identification-app/mobile', slug: 'plant-id' },
      { name: 'VehicleID', emoji: '🚗', path: 'tasks/2026-04-09-vehicle-identification-app/mobile', slug: 'vehicle-id' },
      { name: 'Travel Planner', emoji: '✈️', path: 'tasks/2026-04-13-travel-planner-app/mobile', slug: 'travel-planner' },
      { name: 'Charades!', emoji: '🎭', path: 'tasks/2026-04-18-charades-mobile-game', slug: 'charades-mobile-game' },
      { name: 'Poker Calculator', emoji: '🃏', path: 'tasks/2026-04-30-poker-calculator', slug: 'poker-calculator' },
    ];
    // AUTO-GENERATED-APPS-END

    const grid = document.getElementById('grid');

    APPS.forEach(app => {
      const devcontainerPath = encodeURIComponent(`${app.path}/.devcontainer/devcontainer.json`);
      const url = `https://codespaces.new/${REPO}?devcontainer_path=${devcontainerPath}`;

      const a = document.createElement('a');
      a.className = 'card';
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="emoji">${app.emoji}</div>
        <div class="info">
          <div class="name">${app.name}</div>
          <div class="path">${app.path}</div>
        </div>
        <div class="arrow">→</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
