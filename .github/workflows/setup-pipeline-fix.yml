name: Setup Pipeline Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Apply all pipeline fixes
        run: |
          # 1. Update eas-build.yml
          echo "" | base64 -d > .github/workflows/eas-build.yml
          echo "✓ Updated eas-build.yml"

          # 2. Create asset directories and write all assets
          mkdir -p "tasks/2026-03-27-architecture-project/mobile/assets"
          echo "" | base64 -d > "tasks/2026-03-27-architecture-project/mobile/assets/icon.png"
          echo "✓ tasks/2026-03-27-architecture-project/mobile/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-03-27-architecture-project/mobile/assets/adaptive-icon.png"
          echo "✓ tasks/2026-03-27-architecture-project/mobile/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-03-27-architecture-project/mobile/assets/splash.png"
          echo "✓ tasks/2026-03-27-architecture-project/mobile/assets/splash.png"
          mkdir -p "tasks/2026-04-01-bird-song-id-mvp/mobile/assets"
          echo "" | base64 -d > "tasks/2026-04-01-bird-song-id-mvp/mobile/assets/icon.png"
          echo "✓ tasks/2026-04-01-bird-song-id-mvp/mobile/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-01-bird-song-id-mvp/mobile/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-01-bird-song-id-mvp/mobile/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-01-bird-song-id-mvp/mobile/assets/splash.png"
          echo "✓ tasks/2026-04-01-bird-song-id-mvp/mobile/assets/splash.png"
          mkdir -p "tasks/2026-04-09-plant-identification-app/mobile/assets"
          echo "" | base64 -d > "tasks/2026-04-09-plant-identification-app/mobile/assets/icon.png"
          echo "✓ tasks/2026-04-09-plant-identification-app/mobile/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-09-plant-identification-app/mobile/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-09-plant-identification-app/mobile/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-09-plant-identification-app/mobile/assets/splash.png"
          echo "✓ tasks/2026-04-09-plant-identification-app/mobile/assets/splash.png"
          mkdir -p "tasks/2026-04-09-vehicle-identification-app/mobile/assets"
          echo "" | base64 -d > "tasks/2026-04-09-vehicle-identification-app/mobile/assets/icon.png"
          echo "✓ tasks/2026-04-09-vehicle-identification-app/mobile/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-09-vehicle-identification-app/mobile/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-09-vehicle-identification-app/mobile/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-09-vehicle-identification-app/mobile/assets/splash.png"
          echo "✓ tasks/2026-04-09-vehicle-identification-app/mobile/assets/splash.png"
          mkdir -p "tasks/2026-04-13-travel-planner-app/mobile/assets"
          echo "" | base64 -d > "tasks/2026-04-13-travel-planner-app/mobile/assets/icon.png"
          echo "✓ tasks/2026-04-13-travel-planner-app/mobile/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-13-travel-planner-app/mobile/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-13-travel-planner-app/mobile/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-13-travel-planner-app/mobile/assets/splash.png"
          echo "✓ tasks/2026-04-13-travel-planner-app/mobile/assets/splash.png"
          mkdir -p "tasks/2026-04-18-charades-mobile-game/assets"
          echo "" | base64 -d > "tasks/2026-04-18-charades-mobile-game/assets/icon.png"
          echo "✓ tasks/2026-04-18-charades-mobile-game/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-18-charades-mobile-game/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-18-charades-mobile-game/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-18-charades-mobile-game/assets/splash.png"
          echo "✓ tasks/2026-04-18-charades-mobile-game/assets/splash.png"
          mkdir -p "tasks/2026-04-30-poker-calculator/assets"
          echo "" | base64 -d > "tasks/2026-04-30-poker-calculator/assets/icon.png"
          echo "✓ tasks/2026-04-30-poker-calculator/assets/icon.png"
          echo "" | base64 -d > "tasks/2026-04-30-poker-calculator/assets/adaptive-icon.png"
          echo "✓ tasks/2026-04-30-poker-calculator/assets/adaptive-icon.png"
          echo "" | base64 -d > "tasks/2026-04-30-poker-calculator/assets/splash.png"
          echo "✓ tasks/2026-04-30-poker-calculator/assets/splash.png"

      - name: Create PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="fix/pipeline-assets-$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Fix pipeline: update eas-build.yml + add all app assets"
          git push origin "$BRANCH"
          gh pr create \
            --title "Fix pipeline: eas-build.yml + app assets" \
            --body "## Changes\n- Updated eas-build.yml: legacy-peer-deps, fixed push paths, added path validation\n- Added icon.png, adaptive-icon.png, splash.png for all 7 apps" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
