name: EAS Build

# NOTE: workflow_dispatch options and push paths below list all mobile apps manually.
# When adding a new app, update: options list, push paths, and the APP loop in "Resolve app path".

on:
  # Manual trigger — pick app + profile from the Actions UI
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - tasks/2026-03-27-architecture-project/mobile
          - tasks/2026-04-01-bird-song-id-mvp/mobile
          - tasks/2026-04-09-plant-identification-app/mobile
          - tasks/2026-04-09-vehicle-identification-app/mobile
          - tasks/2026-04-13-travel-planner-app/mobile
          - tasks/2026-04-18-charades-mobile-game/mobile
          - tasks/2026-04-30-poker-calculator/mobile
      profile:
        description: 'Build profile'
        required: true
        default: preview
        type: choice
        options: [development, preview, production]
      platform:
        description: 'Platform'
        required: true
        default: all
        type: choice
        options: [all, ios, android]

  # Auto-trigger on push to main when an app folder changes
  push:
    branches: [main]
    paths:
      - 'tasks/2026-03-27-architecture-project/mobile/**'
      - 'tasks/2026-04-01-bird-song-id-mvp/mobile/**'
      - 'tasks/2026-04-09-plant-identification-app/mobile/**'
      - 'tasks/2026-04-09-vehicle-identification-app/mobile/**'
      - 'tasks/2026-04-13-travel-planner-app/mobile/**'
      - 'tasks/2026-04-18-charades-mobile-game/**'
      - 'tasks/2026-04-30-poker-calculator/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve app path
        id: app
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "path=${{ github.event.inputs.app }}" >> $GITHUB_OUTPUT
          else
            # On push, detect which app folder changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            for APP in \
              "tasks/2026-03-27-architecture-project/mobile" \
              "tasks/2026-04-01-bird-song-id-mvp/mobile" \
              "tasks/2026-04-09-plant-identification-app/mobile" \
              "tasks/2026-04-09-vehicle-identification-app/mobile" \
              "tasks/2026-04-13-travel-planner-app/mobile" \
              "tasks/2026-04-18-charades-mobile-game/mobile" \
              "tasks/2026-04-30-poker-calculator/mobile"; do
              if echo "$CHANGED" | grep -q "^$APP/"; then
                echo "path=$APP" >> $GITHUB_OUTPUT
                break
              fi
            done
          fi

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ steps.app.outputs.path }}-${{ hashFiles(format('{0}/package-lock.json', steps.app.outputs.path)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ steps.app.outputs.path }}-

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.app.outputs.path }}

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ${{ steps.app.outputs.path }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Build
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive
        working-directory: ${{ steps.app.outputs.path }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
